# Generated by agents-team
name: Collaboration Gate

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  issues: read

jobs:
  validate-collaboration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate team collaboration project adapter
        run: python .codex/scripts/validate_team_collaboration.py .
      - name: Validate PR and linked Issue contract
        run: python .codex/scripts/validate_pr_contract.py --event "$GITHUB_EVENT_PATH" --require-issue-lookup
