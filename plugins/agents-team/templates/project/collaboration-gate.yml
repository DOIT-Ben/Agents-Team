# Generated by agents-team
name: Collaboration Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, edited]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  issues: read

jobs:
  validate-collaboration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate team collaboration project adapter
        run: python .codex/scripts/validate_team_collaboration.py .
      - name: Validate PR, linked Issue, and current-head evidence
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python .codex/scripts/validate_pr_contract.py --event "$GITHUB_EVENT_PATH"
