name: 兼容性问题
description: Codex、操作系统、模型或 Provider 组合不兼容
title: "[兼容性] "
labels: ["feedback:compatibility", "status:new"]
body:
  - type: input
    id: run_id
    attributes: {label: run_id}
    validations: {required: true}
  - type: input
    id: agents_team_version
    attributes: {label: agents_team_version}
    validations: {required: true}
  - type: input
    id: environment
    attributes: {label: Codex、系统、Provider 与模型版本, description: 不要填写账号或密钥}
    validations: {required: true}
  - type: textarea
    id: reproduction
    attributes: {label: reproduction}
    validations: {required: true}
  - type: textarea
    id: expected_actual
    attributes: {label: 预期与实际结果}
    validations: {required: true}
